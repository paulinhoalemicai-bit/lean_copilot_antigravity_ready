<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <!-- BPMN.io dependencies -->
    <link rel="stylesheet" href="https://unpkg.com/bpmn-js@13.0.2/dist/assets/diagram-js.css" />
    <link rel="stylesheet" href="https://unpkg.com/bpmn-js@13.0.2/dist/assets/bpmn-font/css/bpmn-embedded.css" />
    <script src="https://unpkg.com/bpmn-js@13.0.2/dist/bpmn-modeler.development.js"></script>

    <style>
      html, body {
        height: 100%;
        margin: 0;
        padding: 0;
        overflow: hidden; 
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      }
      #canvas {
        width: 100%;
        height: 100%;
        background-color: #f7f9fc;
      }
      #save-button {
        position: absolute;
        bottom: 25px;
        right: 25px;
        z-index: 100;
        padding: 12px 20px;
        background-color: #001C59;
        color: white;
        border: none;
        border-radius: 6px;
        cursor: pointer;
        font-weight: bold;
        box-shadow: 0 4px 6px rgba(0,0,0,0.2);
        transition: background-color 0.2s;
        font-size: 14px;
      }
      #save-button:hover { background-color: #0033a0; }
      
      .zoom-controls {
        position: absolute;
        bottom: 85px;
        right: 25px;
        z-index: 100;
        display: flex;
        flex-direction: column;
        gap: 5px;
        background: white;
        border-radius: 6px;
        box-shadow: 0 4px 6px rgba(0,0,0,0.2);
        padding: 5px;
      }
      .zoom-btn {
        width: 35px;
        height: 35px;
        border: none;
        background: transparent;
        cursor: pointer;
        font-size: 20px;
        font-weight: bold;
        color: #001C59;
        border-radius: 4px;
        transition: background-color 0.2s;
      }
      .zoom-btn:hover {
        background-color: #e2e8f0;
      }
    </style>
  </head>
  <body>
    <div id="canvas"></div>
    
    <!-- Painel de Zoom Lateral -->
    <div class="zoom-controls">
      <button class="zoom-btn" id="zoom-origin" title="Ir para o Ponto Zero de Desenho (Eixo 0)">0</button>
      <button class="zoom-btn" id="zoom-in" title="Mais Zoom (Aproximar)">+</button>
      <button class="zoom-btn" id="zoom-out" title="Menos Zoom (Afastar)">-</button>
      <button class="zoom-btn" id="zoom-reset" title="Centralizar Fluxograma">✥</button>
    </div>

    <button id="save-button">💾 Extrair Diagrama para o Doutor Lean</button>

    <script>
      // ==========================================
      // Minimal Streamlit Component Library
      // ==========================================
      function sendMessageToStreamlitClient(type, data) {
          var outData = Object.assign({
              isStreamlitMessage: true,
              type: type,
          }, data);
          window.parent.postMessage(outData, "*");
      }

      const Streamlit = {
          setComponentReady: function() {
              sendMessageToStreamlitClient("streamlit:componentReady", {apiVersion: 1});
          },
          setFrameHeight: function(height) {
              sendMessageToStreamlitClient("streamlit:setFrameHeight", {height: height});
          },
          setComponentValue: function(value) {
              sendMessageToStreamlitClient("streamlit:setComponentValue", {value: value, dataType: "json"});
          },
          RENDER_EVENT: "streamlit:render",
          events: {
              addEventListener: function(type, callback) {
                  window.addEventListener("message", function(event) {
                      if (event.data.type === type) {
                          var simulatedEvent = new CustomEvent(type, {detail: event.data});
                          callback(simulatedEvent);
                      }
                  });
              }
          }
      };

      // ==========================================
      // BPMN Application Logic
      // ==========================================
      let modeler = null;
      let initialized = false;

      function onRender(event) {
        const data = event.detail.args;
        const initialXml = data.xml || "";
        const requestedHeight = data.height || 600;

        // Sempre sincronizamos a altura com o widget Streamlit
        Streamlit.setFrameHeight(requestedHeight);

        if (!initialized) {
            initialized = true;

            modeler = new BpmnJS({
              container: '#canvas',
              keyboard: { bindTo: document }
            });

            if (initialXml && initialXml.trim().length > 0) {
                modeler.importXML(initialXml).then(() => drawOriginMarker()).catch(err => console.error("Erro render BPMN:", err));
            } else {
                modeler.createDiagram().then(() => drawOriginMarker()).catch(err => console.error("Erro render BPMN novo:", err));
            }
            
            function drawOriginMarker() {
                if (document.getElementById('cad-origin-marker')) return;
                const viewport = document.querySelector('.viewport');
                if (!viewport) return;

                const svgNS = "http://www.w3.org/2000/svg";
                const group = document.createElementNS(svgNS, "g");
                group.setAttribute("id", "cad-origin-marker");
                group.setAttribute("style", "pointer-events: none; opacity: 0.5;");

                // Eixo X (Vermelho sutil - Estilo clássico CAD)
                const lineX = document.createElementNS(svgNS, "line");
                lineX.setAttribute("x1", "-5000"); lineX.setAttribute("y1", "0");
                lineX.setAttribute("x2", "5000"); lineX.setAttribute("y2", "0");
                lineX.setAttribute("stroke", "#ef4444"); lineX.setAttribute("stroke-width", "0.7");
                lineX.setAttribute("stroke-dasharray", "10,10");

                // Eixo Y (Azul sutil - Estilo clássico CAD)
                const lineY = document.createElementNS(svgNS, "line");
                lineY.setAttribute("x1", "0"); lineY.setAttribute("y1", "-5000");
                lineY.setAttribute("x2", "0"); lineY.setAttribute("y2", "5000");
                lineY.setAttribute("stroke", "#3b82f6"); lineY.setAttribute("stroke-width", "0.7");
                lineY.setAttribute("stroke-dasharray", "10,10");

                const circle = document.createElementNS(svgNS, "circle");
                circle.setAttribute("cx", "0"); circle.setAttribute("cy", "0");
                circle.setAttribute("r", "8"); circle.setAttribute("fill", "transparent");
                circle.setAttribute("stroke", "#22c55e"); circle.setAttribute("stroke-width", "1.5");

                const text = document.createElementNS(svgNS, "text");
                text.setAttribute("x", "12"); text.setAttribute("y", "-12");
                text.setAttribute("fill", "#64748b"); text.setAttribute("font-size", "13px");
                text.setAttribute("font-family", "monospace"); text.setAttribute("font-weight", "bold");
                text.textContent = "Origem (0, 0)";

                group.appendChild(lineX);
                group.appendChild(lineY);
                group.appendChild(circle);
                group.appendChild(text);

                // Injeta no fundo (z-index espacial SVG mais baixo)
                viewport.insertBefore(group, viewport.firstChild);
            }
            
            document.getElementById('save-button').addEventListener('click', async () => {
                try {
                    const result = await modeler.saveXML({ format: true });
                    Streamlit.setComponentValue(result.xml); // Envia para o backend Python (o st_bpmn)
                    
                    const btn = document.getElementById('save-button');
                    const oldText = btn.innerText;
                    btn.innerText = "✅ Salvo Temporariamente";
                    btn.style.backgroundColor = "#28a745";
                    
                    setTimeout(() => {
                        btn.innerText = oldText;
                        btn.style.backgroundColor = "#001C59";
                    }, 2000);
                } catch (err) {
                    console.error("Save error", err);
                }
            });

            // Controles de Zoom
            const bpmnCanvas = modeler.get('canvas');
            
            document.getElementById('zoom-in').addEventListener('click', () => {
                bpmnCanvas.zoom(bpmnCanvas.zoom() * 1.25);
            });
            
            document.getElementById('zoom-out').addEventListener('click', () => {
                bpmnCanvas.zoom(bpmnCanvas.zoom() * 0.8);
            });
            
            document.getElementById('zoom-reset').addEventListener('click', () => {
                bpmnCanvas.zoom('fit-viewport');
            });
            
            document.getElementById('zoom-origin').addEventListener('click', () => {
                const vb = bpmnCanvas.viewbox();
                bpmnCanvas.viewbox({
                    x: 0,
                    y: 0,
                    width: vb.outer.width,
                    height: vb.outer.height
                });
                bpmnCanvas.zoom(1.0); // Retorna a visualização exata de 100% no eixo-0
            });
        }
      }

      Streamlit.events.addEventListener(Streamlit.RENDER_EVENT, onRender);
      Streamlit.setComponentReady();
    </script>
  </body>
</html>
